services:
  - type: web
    name: buscador-juris
    runtime: node
    rootDir: backend
    buildCommand: |
      apt-get update && apt-get install -y google-chrome-stable --no-install-recommends
      npm install
      npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
    plan: free
